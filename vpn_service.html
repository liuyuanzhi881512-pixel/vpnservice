<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>翻墙服务 - 8000VIP服务</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: #F0EAE4;
      min-height: 100dvh;
      color: #333;
      overscroll-behavior: none;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ===== Hero 标题区 ===== */
    .hero {
      background: linear-gradient(145deg, #2D303B 0%, #3A3D4A 50%, #2D303B 100%);
      margin: 16px 16px 0;
      padding: 40px 24px 36px;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(45,48,59,0.35);
      text-align: center;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -30px;
      width: 140px;
      height: 120px;
      background: radial-gradient(ellipse, rgba(200,170,110,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 20px;
      left: 28px;
      width: 6px;
      height: 6px;
      background: rgba(218,180,90,0.6);
      border-radius: 50%;
      box-shadow:
        22px -14px 0 1px rgba(218,180,90,0.35),
        52px 6px 0 1px rgba(218,180,90,0.25),
        80px -8px 0 1px rgba(218,180,90,0.2);
      pointer-events: none;
    }

    .hero-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      line-height: 1.4;
      background: linear-gradient(135deg, #D4A84C, #F0D68C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 1;
    }

    .hero-subtitle {
      font-size: 14px;
      color: rgba(212,168,76,0.65);
      margin-top: 12px;
      font-weight: 400;
      letter-spacing: 0.5px;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    /* ===== 分类标题 ===== */
    .section-label {
      text-align: center;
      padding: 20px 16px 4px;
      font-size: 14px;
      color: #999;
      letter-spacing: 2px;
    }
    .section-label span {
      display: inline-block;
      padding: 5px 20px;
      border: 1.5px solid #E0D8CC;
      border-radius: 20px;
      color: #B0A090;
      font-weight: 500;
    }

    /* ===== 场景列表 ===== */
    .scene-section {
      padding: 4px 14px 8px;
    }

    .scene-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .scene-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 2px solid #E8E2DA;
      border-radius: 14px;
      padding: 18px 18px;
      cursor: pointer;
      transition: all 0.22s ease;
      -webkit-touch-callout: none;
      user-select: none;
      position: relative;
    }

    .scene-card:active {
      transform: scale(0.98);
    }

    .scene-card.selected {
      border-color: #D4A84C;
      background: #FFFDF5;
      box-shadow: 0 2px 12px rgba(212,168,76,0.15);
    }

    .scene-card.selected .scene-arrow {
      color: #D4A84C;
      transform: translateX(3px);
    }

    .scene-card-left {
      flex: 1;
      min-width: 0;
    }

    .scene-text {
      font-size: 15px;
      font-weight: 600;
      color: #3A3530;
      line-height: 1.5;
    }

    .scene-arrow {
      font-size: 18px;
      color: #C0B8A8;
      margin-left: 12px;
      flex-shrink: 0;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    /* ===== 提示条 ===== */
    .hint-bar {
      text-align: center;
      padding: 10px 16px;
      margin: 4px 16px;
      font-size: 13px;
      color: #A09080;
    }
    .hint-bar span { color: #D4A84C; font-weight: 600; }

    /* ===== 表单卡片 ===== */
    .form-section {
      padding: 4px 14px 20px;
    }

    .form-card {
      background: #fff;
      border-radius: 18px;
      padding: 28px 22px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .form-card h2 {
      font-size: 19px;
      font-weight: 700;
      color: #3A3530;
      margin-bottom: 4px;
      text-align: center;
    }

    .form-card-subtitle {
      text-align: center;
      font-size: 13px;
      color: #B0A898;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #5A544E;
      margin-bottom: 8px;
    }

    .form-group label .required {
      color: #D4544C;
      margin-left: 2px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #E5DED6;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      outline: none;
      background: #FAF8F5;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-appearance: none;
    }

    .form-input:focus {
      border-color: #D4A84C;
      box-shadow: 0 0 0 3px rgba(212,168,76,0.1);
    }

    .form-input::placeholder {
      color: #C0B8A8;
    }

    textarea.form-input {
      min-height: 100px;
      resize: vertical;
      line-height: 1.6;
    }

    /* ===== 提交按钮 ===== */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: #3A3D4A;
      color: #D4A84C;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 6px;
      cursor: pointer;
      transition: all 0.25s ease;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .submit-btn:active {
      transform: translateY(1px);
      background: #2D303B;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(45,48,59,0.92);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      text-align: center;
      max-width: 80%;
      line-height: 1.5;
    }
    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* 底部安全区 */
    .safe-bottom {
      height: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>

  <!-- Hero 标题区 -->
  <div class="hero">
    <div class="hero-title">翻墙服务</div>
    <div class="hero-subtitle">向专员描述您的翻墙需求，专员将为您推荐方案</div>
  </div>

  <!-- 应用场景 -->
  <div class="section-label"><span>应用场景</span></div>

  <div class="scene-section">
    <div class="scene-list">
      <div class="scene-card" data-question="需要体验ChatGPT、Gemini等境外AI服务">
        <div class="scene-card-left">
          <div class="scene-text">需要体验 ChatGPT、Gemini 等境外 AI</div>
        </div>
        <span class="scene-arrow">›</span>
      </div>

      <div class="scene-card" data-question="需要提交VFS境外签证申请">
        <div class="scene-card-left">
          <div class="scene-text">需要提交 VFS 境外签证申请</div>
        </div>
        <span class="scene-arrow">›</span>
      </div>

      <div class="scene-card" data-question="需要观看NETFLIX、HBO等境外流媒体内容">
        <div class="scene-card-left">
          <div class="scene-text">需要观看 NETFLIX、HBO 等境外流媒体</div>
        </div>
        <span class="scene-arrow">›</span>
      </div>

      <div class="scene-card" data-question="需要使用AppleTV等境外电视盒子">
        <div class="scene-card-left">
          <div class="scene-text">需要使用 AppleTV 等境外电视盒子</div>
        </div>
        <span class="scene-arrow">›</span>
      </div>

      <div class="scene-card" data-question="需要联机游玩境外游戏">
        <div class="scene-card-left">
          <div class="scene-text">需要联机游玩境外游戏</div>
        </div>
        <span class="scene-arrow">›</span>
      </div>

      <div class="scene-card" data-question="需要全屋翻墙，覆盖家中所有设备">
        <div class="scene-card-left">
          <div class="scene-text">需要全屋翻墙</div>
        </div>
        <span class="scene-arrow">›</span>
      </div>

      <div class="scene-card" data-question="需要在内地使用富途（Futu）进行证券交易">
        <div class="scene-card-left">
          <div class="scene-text">需要在内地用富途交易</div>
        </div>
        <span class="scene-arrow">›</span>
      </div>

      <!-- 其他兜底 -->
      <div class="scene-card" data-question="" style="border-style: dashed; border-color: #D8D0C4;">
        <div class="scene-card-left">
          <div class="scene-text" style="color: #A09888;">其他翻墙需求（如未列出请补充）</div>
        </div>
        <span class="scene-arrow">›</span>
      </div>
    </div>
  </div>

  <!-- 点击提示 -->
  <div class="hint-bar">点击上方卡片可<span>自动填入</span>表单</div>

  <!-- 表单区 -->
  <div class="form-section">
    <div class="form-card">
      <h2>提交需求</h2>
      <div class="form-card-subtitle">专员将在收到后尽快联系您</div>
      <form id="applyForm">

        <div class="form-group">
          <label>您的企业微信英文名<span class="required">*</span></label>
          <input type="text" class="form-input" id="weworkName" placeholder="例：patfootliu" autocomplete="off">
        </div>

        <div class="form-group">
          <label>请描述您的需求或遇到的问题<span class="required">*</span></label>
          <textarea class="form-input" id="description" placeholder="例如：需要在家用 AppleTV 看 NETFLIX，希望推荐合适的翻墙方案..."></textarea>
        </div>

        <button type="submit" class="submit-btn">提 交</button>
      </form>
    </div>
  </div>

  <div class="safe-bottom"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const SCF_FUNCTION_URL = 'https://1257899736-k5tegb176f.ap-guangzhou.tencentscf.com';
    const WEBHOOK_KEY = '7f867fed-8b0c-4494-a049-e4b734c9f55b';

    let selectedQuestion = null;

    // 场景卡片点击
    document.querySelectorAll('.scene-card').forEach(card => {
      card.addEventListener('click', () => {
        // 取消其他选中
        document.querySelectorAll('.scene-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');

        const q = card.dataset.question;

        if (q) {
          selectedQuestion = q;
          // 去掉末尾问号/句号
          const cleanText = q.replace(/[？?。]+$/, '');
          document.getElementById('description').value = cleanText + '\n\n';
        } else {
          selectedQuestion = null;
          document.getElementById('description').value = '';
        }

        // 滚动到表单
        setTimeout(() => {
          document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
          document.getElementById('description').focus();
        }, 200);
      });
    });

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // 表单提交
    document.getElementById('applyForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('weworkName').value.trim();
      const desc = document.getElementById('description').value.trim();

      if (!name) {
        showToast('请输入您的企业微信英文名');
        return;
      }

      if (!desc) {
        showToast('请描述您的翻墙需求');
        return;
      }

      const btn = e.target.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = '提交中...';

      try {
        const timeStr = new Date().toLocaleString('zh-CN');
        const questionLine = selectedQuestion ? '\n> **选中场景：**' + selectedQuestion.replace(/[？?。]+$/, '') : '';
        const message = {
          msgtype: 'markdown',
          markdown: {
            content:
              '**🌐 翻墙服务新需求**\n\n' +
              '> **称呼：**' + name + '\n' +
              questionLine +
              '\n> **需求描述：**\n' + desc + '\n' +
              '> **时间：**' + timeStr + '\n\n---\n' +
              '<font color="info">8000VIP 翻墙服务</font>'
          }
        };

        const resp = await fetch(SCF_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(message)
        });

        const result = await resp.json();
        if (result.errcode === 0) {
          showToast('✅ 提交成功！专员会尽快联系您');
          document.getElementById('applyForm').reset();
          selectedQuestion = null;
          document.querySelectorAll('.scene-card').forEach(c => c.classList.remove('selected'));
        } else {
          showToast('提交失败：' + (result.errmsg || '未知错误'));
        }
      } catch (err) {
        console.error(err);
        showToast('❌ 提交失败，请稍后重试');
      } finally {
        btn.disabled = false;
        btn.textContent = '提交';
      }
    });
  </script>

</body>
</html>
